<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忘記密碼｜東方之星 The Star</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/login.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <main id="app" v-cloak>
    <section class="auth-single-panel">
      <header class="hotel-mark">
        <h2>THE STAR</h2>
        <p>Hotel &amp; Residences</p>
      </header>

      <div class="form-heading">
        <span>PASSWORD RECOVERY</span>
        <h3>忘記密碼</h3>
      </div>

      <p class="auth-help">輸入註冊時使用的會員信箱。若資料存在，系統會寄送一封密碼重設信。</p>

      <form @submit.prevent="submitRequest">
        <div class="field">
          <label for="email">Member Email</label>
          <input id="email" type="email" required v-model.trim="memberEmail"
                 autocomplete="email" placeholder="請輸入會員信箱">
        </div>

        <button class="login-submit" type="submit" :disabled="submitting">
          {{ submitting ? '寄送中...' : '寄送密碼重設信' }}
        </button>

        <p v-if="errorMsg" class="message error-message" role="alert">{{ errorMsg }}</p>
        <p v-if="successMsg" class="message success-message" aria-live="polite">{{ successMsg }}</p>
      </form>

      <a class="auth-back-link" href="/login.html">返回會員登入</a>
    </section>
  </main>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
