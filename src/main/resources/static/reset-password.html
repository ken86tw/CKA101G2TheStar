<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重設密碼｜東方之星 The Star</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/login.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <main id="app" v-cloak>
    <section class="auth-single-panel">
      <header class="hotel-mark">
        <h2>THE STAR</h2>
        <p>Hotel &amp; Residences</p>
      </header>

      <div class="form-heading">
        <span>RESET PASSWORD</span>
        <h3>設定新密碼</h3>
      </div>

      <p v-if="checking" class="auth-help">正在確認密碼重設連結...</p>

      <div v-else-if="resetCompleted">
        <p class="message success-message" aria-live="polite">{{ successMsg }}</p>
        <p class="auth-help">即將前往會員登入頁...</p>
      </div>

      <p v-else-if="!tokenValid" class="message error-message">此密碼重設連結無效或已過期。</p>

      <form v-else @submit.prevent="submitReset">
        <div class="field">
          <label for="newPassword">New Password</label>
          <input id="newPassword" type="password" required minlength="6"
                 v-model="form.newPassword" autocomplete="new-password"
                 placeholder="請輸入至少 6 個字元">
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" type="password" required minlength="6"
                 v-model="form.confirmPassword" autocomplete="new-password"
                 placeholder="請再次輸入新密碼">
        </div>

        <button class="login-submit" type="submit" :disabled="submitting">
          {{ submitting ? '重設中...' : '確認重設密碼' }}
        </button>

        <p v-if="errorMsg" class="message error-message" role="alert">{{ errorMsg }}</p>
        <p v-if="successMsg" class="message success-message" aria-live="polite">{{ successMsg }}</p>
      </form>

      <a class="auth-back-link" href="/login.html">返回會員登入</a>
    </section>
  </main>
  <script src="/js/reset-password.js"></script>
</body>
</html>
