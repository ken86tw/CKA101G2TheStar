<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="${roomTypeVO.roomTypeId == null ? '新增房型' : '編輯房型'}">表單</title>
<link rel="stylesheet" th:href="@{/css/roomTypeManage.css}">
<!-- CSS 樣式維持不變 (略...) -->
<style>
.form-container { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border: 1px solid #e0dcd5; }
.form-group { margin-bottom: 25px; }
.form-group label { display: block; margin-bottom: 8px; color: #888; font-size: 13px; letter-spacing: 1px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid #e0dcd5; box-sizing: border-box; font-family: inherit; color: #4a4a4a; }
.btn-row { margin-top: 40px; display: flex; gap: 20px; }
</style>
</head>
<body>

    <!-- Header 區塊維持不變 (略...) -->

	<div class="container">
		<header class="admin-header">
			<p class="section-label">ROOM MANAGEMENT</p>
			<h1 th:text="${roomTypeVO.roomTypeId == null ? '新增房型' : '編輯房型'}">表單</h1>
		</header>

		<form th:action="@{${roomTypeVO.roomTypeId == null ? '/roomtype/insert' : '/roomtype/update'}}"
			th:object="${roomTypeVO}" method="post" enctype="multipart/form-data"
			class="form-container">

			<input type="hidden" th:field="*{roomTypeId}" />

			<div class="form-group">
				<label>房型名稱</label> <input type="text" th:field="*{roomTypeName}" required />
			</div>

			<div class="form-group">
				<label>房型圖片</label> 
				<input type="file" id="imageInput" name="imageFile" accept="image/*" />
			</div>

            <!-- 修改後：新增與編輯皆顯示，透過 JavaScript 處理預覽 -->
			<div class="form-group">
				<label>圖片預覽</label> 
				<img id="previewImg" 
                     th:src="${roomTypeVO.roomTypeId != null ? '/roomtypephoto/display/' + roomTypeVO.roomTypeId : '#'}"
                     th:style="${roomTypeVO.roomTypeId != null ? 'display: block; max-width: 100%; height: auto; border-radius: 4px;' : 'display: none; max-width: 100%; height: auto; border-radius: 4px;'}"
                     alt="圖片預覽" />
			</div>

			<div class="form-group">
				<label>庫存數量</label> <input type="number" th:field="*{roomTypeAmount}" min="0" required />
			</div>

			<div class="form-group">
				<label>房型說明</label>
				<textarea th:field="*{roomTypeContent}" rows="5"></textarea>
			</div>

			<div class="form-group">
				<label>價格 (NT$)</label> <input type="number" th:field="*{roomTypePrice}" required />
			</div>

			<div class="form-group">
				<label>狀態</label> <select th:field="*{roomTypeStatus}">
					<option value="true">啟用</option>
					<option value="false">未啟用</option>
				</select>
			</div>

			<div class="btn-row">
				<button type="submit" class="btn" style="flex: 2;">儲存變更</button>
				<a th:href="@{/roomtype/manage}" class="btn ghost" style="flex: 1; text-align: center;">返回</a>
			</div>
		</form>
	</div>

    <!-- 請確保你的 roomTypeManage.js 包含下方的 JS 邏輯 -->
	<script th:src="@{/js/roomTypeManage.js}"></script>
</body>
</html>
