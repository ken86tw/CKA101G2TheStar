<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增時段</title>
    <!-- 引入 Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="container mt-4" style="max-width: 500px;">

    <div class="card shadow-sm p-4">
        <h2><i class="fa-solid fa-clock me-2 text-primary"></i>新增營業時段設定</h2>
        <p class="text-muted">請選擇每半小時拆分的營業時間段</p>
        <hr>
        
        <form th:action="@{/admin/restaurant/businesshours/save}" th:object="${businessHoursVO}" method="post">
            
            <!-- 隱藏欄位：預設自動上架啟用 (解決 @NotNull 阻斷問題) -->
            <input type="hidden" th:field="*{isAvailable}" value="true" />

            <!-- 開始時間下拉選單 -->
            <div class="mb-3">
                <label class="form-label fw-bold">開始時間:</label>
                <select th:field="*{startTime}" 
                        th:classappend="${#fields.hasErrors('startTime')} ? 'is-invalid' : ''"
                        class="form-select" required>
                  
                    <!-- 利用 Thymeleaf 產生 00:00:00 到 23:30:00 的半小時選項 -->
                    <th:block th:each="hour : ${#numbers.sequence(0, 23)}">
                        <!-- 每小時的 00 分 -->
                        <option th:with="timeStr=${#strings.concat(#numbers.formatInteger(hour,2), ':00:00')}"
                                th:value="${timeStr}" th:text="${#strings.substring(timeStr, 0, 5)}"></option>
                        <!-- 每小時的 30 分 -->
                        <option th:with="timeStr=${#strings.concat(#numbers.formatInteger(hour,2), ':30:00')}"
                                th:value="${timeStr}" th:text="${#strings.substring(timeStr, 0, 5)}"></option>
                    </th:block>
                </select>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}"></div>
            </div>
            
            <!-- 結束時間下拉選單 -->
            <div class="mb-3">
                <label class="form-label fw-bold">結束時間:</label>
                <select th:field="*{endTime}" 
                        th:classappend="${#fields.hasErrors('endTime')} ? 'is-invalid' : ''"
                        class="form-select" required>
                    
                    <th:block th:each="hour : ${#numbers.sequence(0, 23)}">
                        <!-- 每小時的 00 分 -->
                        <option th:with="timeStr=${#strings.concat(#numbers.formatInteger(hour,2), ':00:00')}"
                                th:value="${timeStr}" th:text="${#strings.substring(timeStr, 0, 5)}"></option>
                        <!-- 每小時的 30 分 -->
                        <option th:with="timeStr=${#strings.concat(#numbers.formatInteger(hour,2), ':30:00')}"
                                th:value="${timeStr}" th:text="${#strings.substring(timeStr, 0, 5)}"></option>
                    </th:block>
                </select>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}"></div>
            </div>
            
            <!-- 系統錯誤提示除錯區 -->
            <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger p-2 mb-3">
                <p class="m-0 small fw-bold"><i class="fa-solid fa-triangle-exclamation me-1"></i> 系統阻斷原因：</p>
                <ul class="m-0 p-0 ps-3 small">
                    <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                </ul>
            </div>
            
            <!-- 操作按鈕 -->
            <div class="mt-4">
                <button type="submit" class="btn btn-success me-2">
                    <i class="fa-solid fa-floppy-disk me-1"></i> 新增儲存
                </button>
                <a href="/admin/restaurant/businesshours/list" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-turn-up me-1"></i> 返回列表
                </a>
            </div>
        </form>
    </div>

</body>
</html>
